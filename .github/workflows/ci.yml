name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/backend/pyproject.toml
      - run: pip install -e 'packages/backend[dev]'
      - run: pytest packages/backend/tests -v
      - run: alembic -c packages/backend/alembic.ini upgrade head --sql >/tmp/migration.sql

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm audit
      - run: npm test -- --run
      - run: npm run lint
      - run: npm run build
