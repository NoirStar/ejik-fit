name: sync and crawl production sources

on:
  push:
    branches:
      - main
    paths:
      - "packages/backend/src/ejikfit/seed_data.py"
      - "packages/backend/src/ejikfit/skill_catalog.py"
      - "packages/backend/src/ejikfit/skill_extraction.py"
      - "packages/backend/src/ejikfit/skills.py"
      - "packages/backend/alembic/**"
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      company_slug:
        description: "Run one or comma-separated company slugs (leave blank for all)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: production-crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      EJIKFIT_ENV: production
      DATABASE_URL: ${{ secrets.CRAWLER_DATABASE_URL }}
      DATABASE_POOL_MODE: session
      SEARCH_BACKEND: postgres
      POSTGRES_SEARCH_MODE: pgroonga
      S3_ENDPOINT_URL: ${{ secrets.SUPABASE_S3_ENDPOINT_URL }}
      S3_REGION: ${{ secrets.SUPABASE_S3_REGION }}
      S3_ACCESS_KEY: ${{ secrets.SUPABASE_S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.SUPABASE_S3_SECRET_KEY }}
      S3_BUCKET: raw-snapshots
      CRAWLER_MAX_WORKERS: "4"
      NEXON_BROWSER_CHANNEL: chrome
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/backend/pyproject.toml
      - name: Install source registry dependencies
        if: ${{ github.event_name == 'push' }}
        run: pip install './packages/backend'
      - name: Install crawler dependencies
        if: ${{ github.event_name != 'push' }}
        run: pip install './packages/backend[browser]'
      - name: Install crawler browser
        if: ${{ github.event_name != 'push' }}
        run: python -m playwright install --with-deps chromium
      - name: Start virtual display for headed browser sources
        if: ${{ github.event_name != 'push' }}
        shell: bash
        run: |
          Xvfb :99 -screen 0 1440x900x24 >/tmp/ejikfit-xvfb.log 2>&1 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
      - run: alembic -c packages/backend/alembic.ini upgrade head
      - run: ejikfit seed-sources
      - name: Detect skill extraction changes
        id: skill-changes
        if: ${{ github.event_name == 'push' }}
        env:
          BEFORE_SHA: ${{ github.event.before }}
        shell: bash
        run: |
          if [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          elif ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null && \
            ! git fetch --no-tags --depth=1 origin "$BEFORE_SHA"; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$BEFORE_SHA" "$GITHUB_SHA" -- \
            packages/backend/src/ejikfit/skill_catalog.py \
            packages/backend/src/ejikfit/skill_extraction.py \
            packages/backend/src/ejikfit/skills.py; then
            echo "required=false" >> "$GITHUB_OUTPUT"
          else
            echo "required=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Rebuild posting skills after extraction changes
        if: ${{ github.event_name == 'push' && steps.skill-changes.outputs.required == 'true' }}
        run: ejikfit backfill-skills
      - name: Crawl selected sources
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.company_slug != '' }}
        env:
          COMPANY_SLUG: ${{ inputs.company_slug }}
        shell: bash
        run: |
          status=0
          IFS=',' read -r -a slugs <<< "$COMPANY_SLUG"
          for slug in "${slugs[@]}"; do
            if [[ ! "$slug" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
              echo "::error::Invalid company slug: $slug"
              status=1
            elif ! ejikfit crawl-source --company-slug "$slug"; then
              status=1
            fi
          done
          exit "$status"
      - name: Crawl all production sources
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.company_slug == '') }}
        run: ejikfit crawl-all
